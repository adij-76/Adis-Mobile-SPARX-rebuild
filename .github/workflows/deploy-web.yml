name: Deploy web to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/mobile-design-app-build-lhqhpm
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export web build
        run: npx expo export --platform web
        env:
          # Served from https://<user>.github.io/Adis-Mobile-SPARX-rebuild/
          EXPO_PUBLIC_BASE_URL: /Adis-Mobile-SPARX-rebuild
          # Optional: set repo variable SPARKY_WEBHOOK to connect Sparky to n8n.
          EXPO_PUBLIC_SPARKY_WEBHOOK: ${{ vars.SPARKY_WEBHOOK }}

      - name: Disable Jekyll (serve _expo/ and _sitemap)
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
