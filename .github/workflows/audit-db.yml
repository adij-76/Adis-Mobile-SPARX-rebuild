name: Audit DB contract

# Guards the Supabase mobile_* views against the regressions that have bitten
# before: lesson-row fan-out (duplicates), placeholder video titles, and
# renamed/dropped view columns that break the deployed app. Runs on a schedule
# (so drift in the live DB is caught even with no code change), on every merge
# that touches the DB layer, and on demand.

on:
  schedule:
    - cron: '0 12 * * *' # daily, 12:00 UTC
  push:
    branches: [main]
    paths:
      - 'db/**'
      - 'scripts/audit-db-contract.mjs'
      - '.github/workflows/audit-db.yml'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run DB contract audit
        run: node scripts/audit-db-contract.mjs
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
          # Optional: set these repo secrets to enable the per-user checks
          # (mobile_me row, recommended-video titles, gating). Use a dedicated
          # audit/test account, not a real member.
          AUDIT_USER_EMAIL: ${{ secrets.AUDIT_USER_EMAIL }}
          AUDIT_USER_PASSWORD: ${{ secrets.AUDIT_USER_PASSWORD }}
